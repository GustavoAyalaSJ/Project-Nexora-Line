<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Line - Gerenciamento Vagas</title>
    <link rel="stylesheet" href="CSS/style6.css" />
    <link rel="icon" type="image/png" href="Assets/Favicon-purple.webp">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
    <div class="background-container">
        <header class="cabeçalho">
            <a href="index3.html" class="logo-link">
                <div class="logo">
                    <img src="Assets/Nexora-LightPurple.webp" alt="Nexora logo">
                </div>
            </a>
            <nav class="nav-menu">
                <a href="index6.html">
                    <button class="nav-button" id="vagas-button">GERENCIAR VAGAS</button>
                </a>
            </nav>
            <div id="react-userActions">

            </div>
        </header>
        <main class="main-content">
            <h1 class="messageGerenciamento">Gerenciamento de vagas da sua empresa</h1>
            <div id="root">
                <!-- Area onde o React monta o painel de gerenciamento de vagas -->
            </div>
        </main>
    </div>

    <div id="companyPasswordModal">
        <div>
            <h3>Acesso Empresas</h3>
            <p>Digite a senha para acessar o painel de gerenciamento de vagas.</p>
            <input id="companyPasswordInput" type="password" placeholder="Senha" />
            <div>
                <button id="companyPasswordCancel">Fechar</button>
                <button id="companyPasswordSubmit">Entrar</button>
            </div>
            <p id="companyPasswordError">Senha incorreta.</p>
            <p>Observação: Esta proteção é apenas client-side e serve para mitigar acessos casuais.</p>
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="src/script6.jsx"></script>

</body>

</html>
